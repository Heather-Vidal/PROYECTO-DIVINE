
    <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil Administrador</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body{
        background:#b79f8a;
        display:flex;
        justify-content:center;
        padding:30px;
    }

    .container{
        width:11100px;
        display:grid;
        grid-template-columns: 350px 1fr;
        gap:30px;
    }


    .perfil{
        background:#b79f8a;
        border:6px solid #e6d7cf;
        padding:20px;
        text-align:center;
    }

    .perfil img{
        width:2026px;
        height:3000px;
        border-radius:50%;
        object-fit:cover;
        margin-bottom:20px;
    }

    .perfil h2{
        letter-spacing:3px;
        margin-bottom:10px;
    }

    .linea{
        height:4px;
        background:linear-gradient(to right, #6a5acd, #ffffff);
        margin:10px 0 20px;
    }

    .sub{
        font-size:12px;
        letter-spacing:2px;
        margin-bottom:20px;
    }

    .info{
        background:#eee;
        padding:20px;
        border-radius:40px;
        font-size:16px;
        line-height:1.6;
    }

    .pan{
        display:grid;
        grid-template-columns: repeat(2,1fr);
        gap:25px;
    }

    .card{
        background:#d9c9be;
        padding:20px;
        border-radius:40px;
    }

    .card h3{
        margin-bottom:15px;
        letter-spacing:1px;
    }

    .pill{
        display:inline-block;
        background:#eee;
        padding:6px 15px;
        border-radius:20px;
        margin:5px 5px 0 0;
        font-size:14px;
    }

    .wide{
        grid-column: span 2;
        text-align:center;
        font-weight:bold;
    }


    .frase{
        grid-column: span 2;
        background:#eee;
        padding:20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:10px;
    }

    .frase p{
        max-width:75%;
        font-style:italic;
    }

    .frase img{
        width:80px;
        height:80px;
        border-radius:50%;
        object-fit:cover;
    }

    @media(max-width:900px){
        .container{
            grid-template-columns:1fr;
        }

        .panel{
            grid-template-columns:1fr;
        }

        .wide, .frase{
            grid-column: span 1;
        }
    }

</style>
</head>
<body>

<div class="container">

    <div class="perfil">
        <div class="info">         
        </div>
    </div>
    <div class="pan">
        <div class="card">            
        </div>
        <div class="card">       
        </div>
        <div class="card">
        </div>
        <div class="card wide">
        </div>
        <div class="card wide">         
        </div>
        <div class="frase">       
        </div>
    </div>
</div>

</body>
</html>
</body>
</html>
