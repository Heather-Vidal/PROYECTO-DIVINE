<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Landing Page</title>
  <style>
    *
    {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#e9e5dc;color:#111}
    header{display:flex;justify-content:space-between;align-items:center;padding:25px 60px}
    nav{display:flex;gap:35px;font-size:15px}
    nav a{text-decoration:none;color:#111;font-weight:500;transition:0.3s}
    nav a:hover{color:#5b5548}
    .hero{display:flex;justify-content:space-between;align-items:center;padding:40px 60px 80px;gap:40px}
    .left{max-width:550px}
    h1{font-size:72px;line-height:1.05;font-weight:700}
    h1 span{font-style:italic;font-family:Georgia,serif;font-weight:400}
    .subtitle{margin:20px 0;font-size:22px;line-height:1.4}
    .card{margin-top:40px;background:#f4efe6;border-radius:24px;padding:20px;display:flex;gap:20px;align-items:center;width:430px}
    .card img{width:110px;border-radius:18px}
    .btn{display:inline-block;background:#5b5548;color:#fff;padding:12px 22px;border-radius:30px;text-decoration:none;margin-top:15px}
    .right img{width:700px;max-width:100%}
    .logo{font-size:42px;font-family:Georgia,serif;font-weight:bold}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="DIVINE (3).png" alt="" width="150px" >
    </div>
    <nav>
      <a href="#inicio">Inicio</a>
      <a href="#productos">Productos</a>
      <a href="#ofertas">Ofertas</a>
      <a href="#contacto">Contacto</a>
      <a href="#consulta">Consulta Personal</a>
    </nav>
  </header>

  <section class="hero">
    <div class="left">
      <h1>Glow Starts<br>With <span>Natural Beauty</span></h1>
      <p class="subtitle">Productos inspirados en la elegancia de la naturaleza para cuidar tu piel y cabello.</p>

      <div class="card">
        <div>
          <h2>ESENCIAS</h2>
          <p>Producto a base de esencias naturales.</p>
          <a href="#" class="btn">Añadir Producto</a>
        </div>
      </div>
    </div>

    <div class="right"><center>
      <img src="divineee.png" alt="Beauty Products">
    </center></section>div>
  </section>
</body>
</html>
