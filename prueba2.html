 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#9aa8bd,#eef2f8);
}


.dashboard{
height:100vh;
padding:25px;

display:grid;

grid-template-columns:270px 1fr 300px;

grid-template-rows:90px 230px 1fr;

grid-template-areas:

"header header header"
"profile stats stats"
"profile main side";

gap:20px;
}


/* HEADER */

header{
grid-area:header;

background:#ffffffaa;
backdrop-filter:blur(20px);

border-radius:30px;

padding:20px 30px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 15px 35px #0002;
}


header h1{
margin:0;
}


button{
border:none;
cursor:pointer;

border-radius:25px;

font-weight:600;

transition:.2s;
}


button:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px #0003;
}


.logout{
padding:14px 25px;
background:#222;
color:white;
}





/* PERFIL */


.profile{
grid-area:profile;

background:#ffffffaa;
backdrop-filter:blur(20px);

border-radius:30px;

padding:18px;

box-shadow:0 15px 35px #0002;

}


.photo{

height:300px;

border-radius:25px;

background:
linear-gradient(#0003,#0008),
url("https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=700")
center/cover;


color:white;

padding:20px;

display:flex;
flex-direction:column;
justify-content:end;

}


.photo h2{
margin:0;
font-size:28px;
}


.explore{

width:100%;

margin-top:15px;

padding:15px;

background:#f4c542;

}





/* ESTADISTICAS */


.stats{

grid-area:stats;

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}


.card{

border:none;

background:#ffffffcc;

backdrop-filter:blur(20px);

border-radius:30px;

padding:25px;

text-align:left;

box-shadow:0 15px 35px #0002;

}


.card h2{

font-size:40px;

margin:0 0 10px;

}


.yellow{
background:#f4c542;
}



.update{

background:#5d8cff;

color:white;

}



.history{

background:#222;

color:white;

}





/* CENTRO */


.main{

grid-area:main;

background:#ffffffaa;

backdrop-filter:blur(20px);

border-radius:30px;

padding:25px;

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}



.box{

background:white;

border-radius:25px;

padding:25px;

}




.bars{

height:160px;

display:flex;

align-items:end;

gap:18px;

}


.bar{

width:30px;

background:#222;

border-radius:20px;

}


.a{height:70px}
.b{height:120px}
.c{height:90px}

.d{

height:150px;

background:#f4c542;

}




.circle{

width:150px;

height:150px;

border-radius:50%;

border:20px solid #f4c542;

border-left-color:#ddd;

display:flex;

align-items:center;

justify-content:center;

margin:auto;

font-size:28px;

}





/* LADO */

.side{

grid-area:side;

background:white;

border-radius:30px;

padding:25px;

}



.progress{

height:15px;

background:#ddd;

border-radius:20px;

overflow:hidden;

}


.progress div{

height:100%;

width:80%;

background:#f4c542;

}



.tasks{

margin-top:20px;

background:#222;

color:white;

border-radius:20px;

padding:15px;

}



.task{

padding:10px;

border-bottom:1px solid #555;

}




@media(max-width:900px){

.dashboard{

height:auto;

grid-template-columns:1fr;

grid-template-areas:

"header"
"profile"
"stats"
"main"
"side";

}


.stats,
.main{

grid-template-columns:1fr;

}

}

</style>

</head>


<body>


<div class="dashboard">



<header>

<h1>Laura Peterson</h1>

<button class="logout"
onclick="location.href='login.html'">

🔒 Cerrar sesión

</button>

</header>





<section class="profile">


<div class="photo">

<h2>Laura Peterson</h2>

Administrador de tienda

</div>


<button class="explore"
onclick="location.href='funciones.html'">

🚀 Explorar funcionalidades

</button>


</section>







<section class="stats">


<button class="card"
onclick="location.href='pedidos.html'">

<h2>250</h2>

Pedidos

</button>




<button class="card yellow"
onclick="location.href='ventas.html'">

<h2>$8500</h2>

Ventas

</button>





<button class="card"
onclick="location.href='stock.html'">

<h2>120</h2>

Stock

</button>




<button class="card update"
onclick="location.href='actualizar.html'">

<h2>🔄</h2>

Actualizar

</button>





<button class="card history"
onclick="location.href='historial.html'">

<h2>📜</h2>

Historial

</button>



</section>









<section class="main">


<div class="box">

<h3>Rendimiento mensual</h3>


<div class="bars">

<div class="bar a"></div>

<div class="bar b"></div>

<div class="bar c"></div>

<div class="bar d"></div>


</div>

</div>





<div class="box">

<h3>Actividad</h3>


<div class="circle">

85%

</div>


</div>



</section>







<aside class="side">


<h2>Tareas</h2>


<div class="progress">

<div></div>

</div>



<div class="tasks">


<div class="task">
✓ Revisar pedidos
</div>


<div class="task">
✓ Actualizar stock
</div>


<div class="task">
✓ Ver ventas
</div>


</div>


</aside>





</div>


</body>
</html>
