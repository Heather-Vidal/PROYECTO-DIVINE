<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: grid;
            grid-template-rows: 100px 500px 100px;
            background: #EBE8D9 ;
            color: #111;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display:grid;
       grid-template-columns:50% 50%;
       grid-template-areas: 
       "uno uno"
       " dos tres"
       "cua cua";
       gap:7px;
}
nav{
    display: flex;
    gap: 35px;
}
nav a{
    text-decoration: none;
    color: #111;
    font-weight: 500;
    transition: 0.3s;
}
nav a:hover{
    color: #000;
}
header{
    grid-area:uno;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
}
.sub{
    font-size:18px;
    margin-bottom:30px;
    max-width:500px;
}
.box{
    background:#d6c8b3;
    padding:20px;
    border-radius:15px;
    width:250px;
}

.box h2{
    margin-bottom:10px;
}

.box p{
    margin-bottom:15px;
}

.box a{
    text-decoration:none;
    background:#111;
    color:white;
    padding:10px 15px;
    border-radius:10px;
}
h1{font-size:72px;line-height:1.05;font-weight:700}
  h1  p{font-style:italic;font-family:Georgia,serif;font-weight:400}


.derecha{
    grid-area: tres;
    display: flex;
    justify-content: center;
    align-items: center;
}
.derecha{width: 350;}
section{
    grid-area: dos;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 30px;
}
footer{
    grid-area: cua;
}
    </style>
</head>
<body>
    <header>
          <img src="DIVINE-removebg-preview.png" alt="Logo" width="150">
  <Nav>
        <a href="#inicio">Inicio</a>
        <a href="#productos">Productos</a>
        <a href="#ofertas">Ofertas</a>
        <a href="#contacto">Contacto</a>
        <a href="#consulta">Consulta Personal</a>
    </Nav>
    </header>
    <section>
    <h1>
        Glow Starts <br>
        With <label class="color">Natural Beauty</label>
    </h1>
    <p class="sub">
        Productos inspirados en la elegancia de la naturaleza 
        para cuidar tu piel y cabello.
    </p>
        <section class="box">
        <h2>ESENCIAS</h2>
        <p>
            Producto a base de esencias naturales.
        </p>
        <a href="#">Añadir Producto</a>
    </section>
</section>

       <section class="derecha">

    <img src="divineee.png" alt="Beauty Products">

</section>

<footer></footer>
</body>
</html>
