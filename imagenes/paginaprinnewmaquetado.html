<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maquetado Divine Grid</title>

    <style>
        body{
            margin: 0;
            padding: 10px;
            background-color: #f2eee6;

            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 100px 300px 300px;
            gap: 10px;
            height: 95vh;
        }

        header{
            grid-column: 1 / 3;
            display: flex;
            gap: 10px;
        }

        .c1{
            width: 15%;
            border: 3px solid black;
            background: white;
        }

        .c2{
            flex: 1;
            border: 3px solid black;
            background: white;
        }

        .c3{
            width: 20%;
            border: 3px solid black;
            background: white;
        }

        .sec1{
            border: 3px solid black;
            background: white;
        }

        .sec2{
            border: 3px solid black;
            background: white;
        }

        .lateral{
            grid-column: 2;
            grid-row: 2 / 4;
            border: 3px solid black;
            background: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="c1"></div>
        <div class="c2"></div>
        <div class="c3"></div>
    </header>

    <section class="sec1"></section>

    <section class="sec2"></section>

    <div class="lateral"></div>

</body>
</html>
