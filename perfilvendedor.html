    "panel contenido";
    font-family:Arial, Helvetica, sans-serif;
}

}


 
.bodycito::before{
 
.bodyzote_bloq1 {
    grid-area: titulo;
    display: flex;
    justify-content: center;
    align-items: center;
  background: 
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("fondo.png") no-repeat center fixed;

    background-size: 100% 100%;

   height: 98vh;

 

    content:"";

    position:absolute;

    top:18px;
    left:18px;
    right:18px;
    bottom:18px;

    border:3px dotted rgba(255,255,255,0.45);

    pointer-events:none;
}
 
 
.bodyzote_bloq2 {
    grid-area: datos;
    display: flex;
    justify-content: center;
    align-items: center;

  background: 
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("fondo.png") no-repeat center fixed;

    background-size: 100% 100%;

   height: 98vh;

}
.bodyzote_bloq3 {
    grid-area: seccion;
    display: flex;
    justify-content: center;
    align-items: center;
  background: 
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url("fondo.png") no-repeat center fixed;

    background-size: 100% 100%;

   height: 98vh;



}







 
.bodycito {

 padding:35px;

border:3px solid rgba(255,255,255,0.35);

position:relative;
      position:absolute;
 
    grid-area:panel;
    position:absolute;
 
    left:0;
    top:0;
    width:22%;
    height:100%;
    z-index:2;
    padding:35px;
    background:
    linear-gradient(
        rgba(185,170,145,0.78),
        rgba(166,148,122,0.78),
        rgba(145,130,105,0.78)
    );

 
    border:1px dashed rgba(255,255,255,0.35);

    display:grid;
 
}
.bodycito_bloq1 {
    background:
        linear-gradient(
    
    rgba(175, 160, 135, 0.65),
    rgba(160, 145, 120, 0.65),
    rgba(145, 130, 105, 0.65)
        );
    grid-area: imagen;
    display: flex;
    justify-content: center;
    align-items: center;
 

}
.bodycito_bloq2 {
    grid-area: botones;
    display: flex;
    justify-content: center;
    align-items: center;

background:
        linear-gradient(
    
    rgba(175, 160, 135, 0.65),
    rgba(160, 145, 120, 0.65),
    rgba(145, 130, 105, 0.65)
        );
}
.bodycito_bloq3 {
    grid-area: redes;
    display: flex;
    justify-content: center;
    align-items: center;
background:
        linear-gradient(
    
    rgba(175, 160, 135, 0.65),
    rgba(160, 145, 120, 0.65),
    rgba(145, 130, 105, 0.65)
        );
 
    border:2px solid rgba(255,255,255,0.25);
    display:grid;
 
    grid-template-areas:
    "sec1"
    "sec2"
    "sec3";
    grid-template-rows:45% 30% 25%;
    animation:panelMove 5s infinite ease-in-out;
}
.bodycito::before{

    content:"";
    position:absolute;
    top:18px;
    left:18px;
    right:18px;
    bottom:18px;
    border:3px dotted rgba(255,255,255,0.45);
    pointer-events:none;
}
.bodycito_sec1{
    grid-area:sec1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}
.perfil{
    width:240px;
    height:240px;
    border-radius:50%;
    overflow:hidden;
    border:5px solid rgba(255,255,255,0.35);
    animation:perfilGlow 4s infinite ease-in-out;
    box-shadow:
    0 0 25px rgba(255,255,255,0.25),
    0 0 60px rgba(255,255,255,0.15);
    transition:0.5s;
}

.perfil img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.estrellas{
    color:#8d7760;
    font-size:50px;
    letter-spacing:5px;
}
.bodycito_sec2{
    grid-area:sec2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:25px;
}

.btn_lateral{
    width:230px;
    padding:14px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.55);
    color:white;
    text-transform:uppercase;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}
.btn_lateral:hover{
    background:rgba(255,255,255,0.15);
    transform:scale(1.08);
    box-shadow:
    0 0 15px rgba(255,255,255,0.3);
}
.bodycito_sec3{
    grid-area:sec3;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
}

.bodycito_sec3 i{
    color:white;
    font-size:28px;
    cursor:pointer;
    transition:0.4s;
}

.bodycito_sec3 i:hover{
    transform:
    scale(1.35)
    rotate(8deg);
    color:#f7e7d3;
    text-shadow:
    0 0 10px white,
    0 0 25px white;
}
.bodyzote{
    grid-area:contenido;
    width:100%;
    height:100%;
    display:grid;
    grid-template-areas:
    "top"
    "mid"
    "bottom";
    grid-template-rows:25% 40% 35%;
    animation:entrada 1.2s ease;
}
.bodyzote_sec1{
    grid-area:top;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:58px;
    letter-spacing:10px;
    font-weight:200;
}
.bodyzote_sec2{
    grid-area:mid;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:35px;
}

.fila{
    width:45%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
    padding-bottom:12px;
    animation:entrada 1.5s ease;
}

.label{
    width:150px;
    padding:10px;
    border:1px solid rgba(255,255,255,0.45);
    text-align:center;
    color:white;
    font-size:12px;
    font-weight:bold;
}
.valor{
    color:#7b6754;
    font-size:32px;
    font-weight:600;
}
.bodyzote_sec3{

    grid-area:bottom;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:45px;
    flex-wrap:wrap;
}
.btn_menu{

    width:190px;
    height:70px;
    border:none;
    border-radius:50px;

    background:
    linear-gradient(
        90deg,
        rgba(201,185,164,0.95),
        rgba(171,145,117,0.95)
    );

    color:white;

    text-transform:uppercase;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}

.btn_menu:hover{

    transform:
    scale(1.12)
    translateY(-6px);
    opacity:0.95;
    box-shadow:
    0 10px 25px rgba(0,0,0,0.35);
}
@keyframes perfilGlow{

    0%{

        transform:scale(1);
        box-shadow:
        0 0 25px rgba(255,255,255,0.2),
        0 0 50px rgba(255,255,255,0.1);
    }

    50%{

        transform:scale(1.12);
        box-shadow:
        0 0 35px rgba(255,255,255,0.9),
        0 0 90px rgba(255,255,255,0.5),
        0 0 140px rgba(255,255,255,0.3);
    }

    100%{

        transform:scale(1);
        box-shadow:
        0 0 25px rgba(255,255,255,0.2),
        0 0 50px rgba(255,255,255,0.1);
    }
}

@keyframes panelMove{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
@media (max-width: 768px){

    body{
        overflow-y:auto;
        overflow-x:hidden;
        grid-template-columns:100%;
        grid-template-areas:
        "panel"
        "contenido";
    }

    .bodycito{
        position:relative;
        width:100%;
        height:auto;
        padding:25px 15px;
        grid-template-rows:auto auto auto;
        gap:25px;
        animation:none;
    }

    .bodycito::before{
        top:10px;
        left:10px;
        right:10px;
        bottom:10px;
    }

    .perfil{
        width:170px;
        height:170px;
    }

    .estrellas{
        font-size:35px;
        text-align:center;
    }

    .bodycito_sec2{
        gap:18px;
    }

    .btn_lateral{
        width:90%;
        font-size:14px;
    }

    .bodycito_sec3{
        gap:25px;
        padding-bottom:10px;
    }

    .bodycito_sec3 i{
        font-size:24px;
    }

    .bodyzote{
        width:100%;
        height:auto;
        padding:20px 10px;
        grid-template-rows:auto auto auto;
        gap:30px;
    }

    .bodyzote_sec1{
        text-align:center;
        padding-top:10px;
    }

    .bodyzote_sec1 h1{
        font-size:32px;
        letter-spacing:4px;
    }

    .bodyzote_sec2{
        gap:22px;
    }

    .fila{

        width:95%;
        flex-direction:column;
        gap:12px;
        padding-bottom:18px;
    }

    .label{
        width:80%;
        font-size:11px;
    }

    .valor{
        font-size:24px;
        text-align:center;
    }

    .bodyzote_sec3{
        gap:18px;
        padding-bottom:25px;
    }

    .btn_menu{

        width:140px;
        height:58px;
        font-size:16px;
    }
}
</style>
