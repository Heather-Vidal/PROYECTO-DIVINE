<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador</title>

<style>

.caja{
    display:grid;
    grid-template-columns:320px 1fr;
    grid-template-areas:
    " sidebar contenido";
    min-height:100vh;  
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#cbb4a1,#e9ddd4);
    color:#6e5d5d;
}

.cajita{
    grid-area:sidebar;
    background:#bfa892;
    padding:30px 20px;
    border-right:5px solid #f3e7df;
        animation:latido 3s infinite ease-in-out;
    transform-origin:center;
}
.cuadro{
    grid-area:contenido;
    padding:40px;
}
.cajota{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.uno{
    background:#ccb6a2;
    border:5px solid #f3e7df;
    padding:25px;
    text-align:center;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);   
}
.uno img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
   }
  .dos{
    margin-top:15px;
    border-top:4px solid white;
    padding-top:15px;
    font-size:13px;
    letter-spacing:4px;
    font-weight:bold;
}

.tres{
    margin-top:30px;
    background:white;
    border-radius:40px;
    padding:30px;
    text-align:left;
    line-height:2;
    font-size:22px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
   
}


.bloque{
    background:#efe4dc;
    padding:35px;
    border-radius:35px;
    min-height:180px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    transition:0.5s;
    position:relative;
    overflow:hidden;
}


.frase{
    margin-top:40px;
    background:white;
    padding:35px;
    border-radius:35px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    font-size:28px;
    font-style:italic;
    color:#555;
    line-height:1.6;
}

@media(max-width:900px){

    .caja{
        grid-template-columns:1fr;
        grid-template-areas:
        "sidebar"
        "contenido";
    }

    .cajita{
        border-right:none;
        border-bottom:5px solid #f3e7df;
    }

    .cuadro{
        padding:20px;
    }

    .uno img{
        width:160px;
        height:160px;
    }

    .frase{
        text-align:center;
    }
}
footer{
    background:#bfa892;
    color:white;
    text-align:center;
    padding:25px;
    font-size:18px;
    letter-spacing:2px;
    border-top:5px solid #f3e7df;
    margin-top:20px;
    box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

footer p{
    margin:8px 0;
}
</style>
</head>

<body>

<div class="caja">
    <aside class="cajita">

        <div class="uno">
            <img src="https://i.pinimg.com/736x/4a/54/a0/4a54a016d7b01e9f18f6f5d7f2511a05.jpg" alt="Administrador">
            <h2></h2>
            <div class="dos"> </div>

            <div class="tres">
                <p></p>
                <p></p>
            </div>
        </div>

    </aside>
    <main class="cuadro">

        <section class="cajota">

            <article class="bloque">
                <h3></h3>
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </article>

            <article class="bloque">
                <h3></h3>
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </article>

            <article class="bloque">
                <h3></h3>
                <ul>
                    <li></li>
                    <li></li>
                </ul>
            </article>

            <article class="bloque">
                <h3></h3>
            </article>

            <article class="bloque">
                <h3></h3>
            </article>

        </section>

        <section class="frase">
            <p>
            </p>
        </section>

    </main>

</div>
<footer>
        <p>  </p>  <p></p>    <p></p>
</footer>
</body>
</html>
