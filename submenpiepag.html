<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.footer-divine{
    background:linear-gradient(
        135deg,
        #d89aa7,
        #bf7485
    );
    color:white;
    padding:70px 10%;
    margin-top:80px;
}

.redes{
    text-align:center;
    margin-bottom:50px;
}

.redes a{
    text-decoration:none;
    color:white;
    font-size:35px;
    margin:0 15px;
    transition:.4s;
}

.redes a:hover{
    color:#ffe7ed;
    transform:translateY(-5px);
}

.footer-contenido{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

.footer-box{
    background:rgba(255,255,255,.12);
    padding:25px;
    border-radius:20px;
}

.footer-box h3{
    color:white;
    margin-bottom:15px;
}

.footer-box p{
    line-height:1.8;
}

.copyright{
    text-align:center;
    margin-top:50px;
    padding-top:25px;
    border-top:1px solid rgba(255,255,255,.2);
}


</style>
<body>
    <footer class="footer-divine">

    <div class="redes">
        <img src="./imagenes/face.png" width="50" height="50" alt="Facebook">
        <img src="./imagenes/watsi.png" width="50" height="50" alt="WhatsApp">
        <img src="./imagenes/instagram.png" width="50" height="50" alt="Instagram">
    </div>

    <div class="footer-contenido">

        <div class="footer-box">
            <h3> Contacto</h3>
            <p>Celular: 70000000</p>
            <p>WhatsApp: 70000000</p>
            <p>Correo: divine@gmail.com</p>
        </div>

        <div class="footer-box">
            <h3> Ubicación</h3>
            <p>
                Cochabamba - Bolivia<br>
                Zona Central<br>
                Calle Principal Nº 123
            </p>
        </div>

        <div class="footer-box">
            <h3> Redes Sociales</h3>
            <p>Instagram: @divine</p>
            <p>Facebook: Divine Bolivia</p>
            <p>TikTok: @divine.oficial</p>
        </div>

    </div>

    <div class="copyright">
        © 2025 DIVINE - Todos los derechos reservados
    </div>

</footer>

</body>
</html>
